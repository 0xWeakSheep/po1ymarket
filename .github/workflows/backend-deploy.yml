name: Backend Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Prepare deployment bundle
        run: |
          rm -rf release
          mkdir -p release
          cp -R dist release/dist
          cp package.json package-lock.json release/
          tar -czf backend-release.tgz -C release .

      - name: Upload deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: backend/backend-release.tgz
          target: /tmp

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ vars.BACKEND_PM2_NAME || 'po1market-backend' }}
          RELEASE_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_PATH,PM2_APP_NAME,RELEASE_SHA
          script: |
            set -eu
            if ! command -v node >/dev/null 2>&1; then
              echo "node is required on the server" >&2
              exit 1
            fi
            if ! command -v npm >/dev/null 2>&1; then
              echo "npm is required on the server" >&2
              exit 1
            fi
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 is required on the server" >&2
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH/releases"
            RELEASE_PATH="$DEPLOY_PATH/releases/${RELEASE_SHA}"
            rm -rf "$RELEASE_PATH"
            mkdir -p "$RELEASE_PATH"
            tar -xzf /tmp/backend/backend-release.tgz -C "$RELEASE_PATH"
            cd "$RELEASE_PATH"
            npm ci --omit=dev
            ln -sfn "$RELEASE_PATH" "$DEPLOY_PATH/current"

            if [ -f "$DEPLOY_PATH/.env" ]; then
              set -a
              . "$DEPLOY_PATH/.env"
              set +a
            fi

            pm2 delete "$PM2_APP_NAME" >/dev/null 2>&1 || true
            pm2 start "$DEPLOY_PATH/current/dist/main.js" --name "$PM2_APP_NAME"
            pm2 save
